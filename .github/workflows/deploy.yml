name: Deploy to Chub

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Chub
        env:
          CHUB_API_TOKEN: ${{ secrets.CHUB_API_TOKEN }}
        run: |
          curl -X POST https://api.chub.ai/v1/stages/deploy \
            -H "Authorization: Bearer $CHUB_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"repository": "${{ github.repository }}", "branch": "${{ github.ref }}"}'
